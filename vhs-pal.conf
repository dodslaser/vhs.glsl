# vhs-pal.conf — mpv PAL VHS/VCR degradation shader
#
#  Pulls shared profiles (deck/output + per-tier tape character) from vhs-common.conf.
#
# ── HOW TO USE ────────────────────────────────────────────────────────────────
#
#  Apply a preset:
#    mpv --include=/path/to/vhs-pal.conf --profile=vhs-rental video.mkv
#
#  Letterbox instead of crop — append vhs-letterbox after the preset:
#    mpv --include=/path/to/vhs-pal.conf --profile=vhs-home,vhs-letterbox video.mkv
#
#  Override a parameter at the command line (use -append: a plain --glsl-shader-opts=
#  would replace the preset's whole list, including the standard selector STANDARD):
#    mpv --profile=vhs-rental --glsl-shader-opts-append=RECORDING_MODE=LP video.mkv
#
#  Swap the audio tier — a tier is the pair audio-<t> + tape-<t>; append both:
#    mpv --profile=vhs-home,audio-dying,tape-dying video.mkv
#    (tiers: clean, worn, dying)
#
# Or add to ~/.config/mpv/mpv.conf:
#   include=/path/to/vhs-pal.conf
# Then: mpv --profile=vhs-home video.mkv
#
#  For NTSC content use vhs-ntsc.conf instead — same profile names, so only the
#  included file changes.
#
# ── PRESETS ───────────────────────────────────────────────────────────────────
#
#    vhs-home          typical home recording — SP, good tape, average deck
#    vhs-camcorder     handheld camcorder — LP, new tape, locked sync
#    vhs-tv-record     recorded off TV — LP, clean signal, good deck
#    vhs-rental        rental store copy — SP, worn tape, worn deck, 2nd gen
#    vhs-bootleg       LP copy-of-copy — cramped, grainy, wobbly
#    vhs-nth-copy      4th-gen LP dub — barely coherent, washed-out color
#    vhs-attic         found in a box — old, bad tracking, mystery origin
#    vhs-dying         terminal playback — ancient, clogged, rolling
#
#  PAL = 625/50: 768×576, 4.43 MHz subcarrier, hue-stable color (Hanover bars on
#  mistrack), 0 IRE black, 25 fps, 50 Hz hum. SP/LP only (no EP → RECORDING_MODE=LP at most).
#
# ── GEOMETRY ──────────────────────────────────────────────────────────────────
#
#  Default: square-pixel normalize, center-crop to 4:3 (both axes), then scale to the
#  shader's 768×576 working raster so every pass samples 1:1 (mpv upscales the result).
#  To letterbox instead, append vhs-letterbox after the preset.
#
#  Paths below assume ~/Repos/vhs2 (mpv expands ~ to $HOME) — change if moved.

include=~/Repos/vhs2/vhs-common.conf

[vhs-pal]
profile-desc=PAL shader + geometry over the shared deck/audio base
profile=vhs-common-video,vhs-common-audio
glsl-shaders=~/Repos/vhs2/vhs.glsl
glsl-shader-opts=STANDARD=PAL
vf=lavfi=[scale=iw*sar:ih,setsar=1,crop=min(iw\,ceil(ih*4/3)):min(ih\,ceil(iw*3/4)),scale=768:576,fps=25]

[vhs-pal-audio-clean]
profile-desc=PAL audio noise/hum: quiet hiss, faint 50 Hz hum — good tape/deck
profile=vhs-common-audio-clean
af-add=lavfi=[anoisesrc=color=pink:amplitude=0.60:sample_rate=48000[pink];sine=frequency=50:sample_rate=48000[h50];sine=frequency=100:sample_rate=48000[h100];[in][pink][h50][h100]amix=inputs=4:duration=first:weights='1 0.02 0.024 0.016':normalize=0[out]]

[vhs-pal-audio-worn]
profile-desc=PAL audio noise/hum: audible hiss, steady 50 Hz hum, print-through echo — worn tape
profile=vhs-common-audio-worn
af-add=lavfi=[aecho=1:0.96:38:0.03]
af-add=lavfi=[anoisesrc=color=pink:amplitude=0.70:sample_rate=48000[pink];sine=frequency=50:sample_rate=48000[h50];sine=frequency=100:sample_rate=48000[h100];[in][pink][h50][h100]amix=inputs=4:duration=first:weights='1 0.04 0.036 0.024':normalize=0[out]]

[vhs-pal-audio-dying]
profile-desc=PAL audio noise/hum: heavy hiss, loud 50 Hz hum, print-through echo — ancient tape
profile=vhs-common-audio-dying
af-add=lavfi=[aecho=1:0.94:55:0.06]
af-add=lavfi=[anoisesrc=color=pink:amplitude=0.80:sample_rate=48000[pink];sine=frequency=50:sample_rate=48000[h50];sine=frequency=100:sample_rate=48000[h100];[in][pink][h50][h100]amix=inputs=4:duration=first:weights='1 0.08 0.096 0.064':normalize=0[out]]

[vhs-letterbox]
profile-desc=Geometry override: letterbox to 4:3 instead of cropping — append after preset
vf=lavfi=[scale=iw*sar:ih,setsar=1,pad=max(iw\,ceil(ih*4/3)):max(ih\,ceil(iw*3/4)):(ow-iw)/2:(oh-ih)/2,scale=768:576,fps=25]

[vhs-home]
profile-desc=PAL VHS: typical home recording — SP, good tape, average deck
profile=vhs-pal,vhs-pal-audio-clean
glsl-shader-opts=STANDARD=PAL,TAPE_AGE=0.28,TAPE_WEAR=0.30,HEAD_ALIGNMENT=0.20,HEAD_WEAR=0.25,TRACKING=0.12,GENERATION=1.0,SYNC_STABILITY=0.92,RECORDING_MODE=SP

[vhs-camcorder]
profile-desc=PAL VHS: handheld camcorder — LP, new tape, decent heads, locked sync
profile=vhs-pal,vhs-pal-audio-clean
glsl-shader-opts=STANDARD=PAL,TAPE_AGE=0.15,TAPE_WEAR=0.15,HEAD_ALIGNMENT=0.20,HEAD_WEAR=0.18,TRACKING=0.12,GENERATION=1.0,SYNC_STABILITY=0.93,RECORDING_MODE=LP

[vhs-tv-record]
profile-desc=PAL VHS: recorded off broadcast TV — LP, clean signal, good deck
profile=vhs-pal,vhs-pal-audio-clean
glsl-shader-opts=STANDARD=PAL,TAPE_AGE=0.22,TAPE_WEAR=0.20,HEAD_ALIGNMENT=0.15,HEAD_WEAR=0.18,TRACKING=0.15,GENERATION=1.0,SYNC_STABILITY=0.90,RECORDING_MODE=LP,GHOSTING=0.35

[vhs-rental]
profile-desc=PAL VHS: rental store tape — SP, worn, worn deck, 2nd gen
profile=vhs-pal,vhs-pal-audio-worn
glsl-shader-opts=STANDARD=PAL,TAPE_AGE=0.65,TAPE_WEAR=0.70,HEAD_ALIGNMENT=0.55,HEAD_WEAR=0.58,TRACKING=0.52,GENERATION=2.0,SYNC_STABILITY=0.58,RECORDING_MODE=SP

[vhs-bootleg]
profile-desc=PAL VHS: LP copy-of-copy — cramped, grainy, wobbly, smeared color
profile=vhs-pal,vhs-pal-audio-worn
glsl-shader-opts=STANDARD=PAL,TAPE_AGE=0.48,TAPE_WEAR=0.55,HEAD_ALIGNMENT=0.60,HEAD_WEAR=0.62,TRACKING=0.55,GENERATION=3.0,SYNC_STABILITY=0.60,RECORDING_MODE=LP

[vhs-nth-copy]
profile-desc=PAL VHS: 4th-gen LP dub — barely coherent, washed-out, noisy
profile=vhs-pal,vhs-pal-audio-worn
glsl-shader-opts=STANDARD=PAL,TAPE_AGE=0.55,TAPE_WEAR=0.58,HEAD_ALIGNMENT=0.50,HEAD_WEAR=0.55,TRACKING=0.45,GENERATION=4.0,SYNC_STABILITY=0.62,RECORDING_MODE=LP

[vhs-attic]
profile-desc=PAL VHS: found in a box — old tape, worn deck, bad tracking, mystery origin
profile=vhs-pal,vhs-pal-audio-dying
glsl-shader-opts=STANDARD=PAL,TAPE_AGE=0.88,TAPE_WEAR=0.85,HEAD_ALIGNMENT=0.65,HEAD_WEAR=0.70,TRACKING=0.65,GENERATION=1.0,SYNC_STABILITY=0.40,RECORDING_MODE=LP

[vhs-dying]
profile-desc=PAL VHS: terminal playback — ancient tape, clogged head, LP, sync lost
profile=vhs-pal,vhs-pal-audio-dying
glsl-shader-opts=STANDARD=PAL,TAPE_AGE=0.96,TAPE_WEAR=0.96,HEAD_ALIGNMENT=0.95,HEAD_WEAR=0.95,TRACKING=0.92,GENERATION=3.0,SYNC_STABILITY=0.12,RECORDING_MODE=LP
