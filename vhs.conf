# vhs.conf — mpv VHS/VCR degradation shader (NTSC + PAL)
#
# ── HOW TO USE ────────────────────────────────────────────────────────────────
#
#  Pick a standard (vhs-ntsc / vhs-pal) and a preset:
#    mpv --include=/path/to/vhs.conf --profile=vhs-pal,vhs-rental video.mkv
#
#  Or add to ~/.config/mpv/mpv.conf:
#    include=/path/to/vhs.conf
#  Then: mpv --profile=vhs-ntsc,vhs-home video.mkv
#
#  Override a shader parameter at the command line (parameters are namespaced
#  vhs/<PARAMETER>; -append overwrites a key the preset already set):
#    mpv --profile=vhs-pal,vhs-rental --glsl-shader-opts-append=vhs/TRACKING=0.8 video.mkv
#
#  Build a custom combo from the parts (standard + audio tier + raw params):
#    mpv --profile=vhs-ntsc,vhs-audio-worn --glsl-shader-opts-add=vhs/TAPE_AGE=0.5,vhs/GENERATION=3.0 video.mkv
#    (audio tiers: vhs-audio-clean, vhs-audio-worn, vhs-audio-dying — each
#     preset bakes one in; appending a second tier stacks its filters on top)
#
#  Widescreen/letterboxed content is padded to 4:3 with black bars, then
#  scaled to the standard's raster (640x480@29.97 / 768x576@25).
#
#  Presets use NTSC recording modes; on PAL, EP is capped to LP automatically
#  (PAL has no EP). vhs-tv-record picks its GHOSTING per standard.
#
# ── PRESETS (standard-agnostic — combine with vhs-ntsc or vhs-pal) ───────────
#
#    vhs-home          typical home recording — SP, good tape, average deck
#    vhs-camcorder     handheld camcorder — LP, new tape, locked sync
#    vhs-tv-record     recorded off TV — LP, clean signal, good deck
#    vhs-rental        rental store copy — SP, worn tape, worn deck, 2nd gen
#    vhs-bootleg       EP copy-of-copy — cramped, grainy, wobbly
#    vhs-nth-copy      4th-gen EP dub — barely coherent, washed-out color
#    vhs-attic         found in a box — old, bad tracking, mystery origin
#    vhs-dying         terminal playback — ancient, clogged, rolling

[vhs-base]
profile-desc=Common VHS deck/output settings + base audio chain
vo=gpu-next
glsl-shaders=~/Repos/vhs2/vhs.glsl
audio-channels=stereo
af=lavfi=[aformat=channel_layouts=stereo]
af-add=lavfi=[extrastereo=m=0]
af-add=lavfi=[highpass=50]
af-add=lavfi=[acompressor=threshold=-18dB:ratio=4:attack=20:release=250:makeup=2]
af-add=lavfi=[bass=g=2:f=110:w=0.8]


[vhs-ntsc]
profile-desc=NTSC: 640x480 @ 29.97, YIQ, 60 Hz hum
profile=vhs-base
glsl-shader-opts-append=vhs/STANDARD=NTSC
vf-add=lavfi=[scale=iw*sar:ih,setsar=1,pad=max(iw\,ceil(ih*4/3)):max(ih\,ceil(iw*3/4)):(ow-iw)/2:(oh-ih)/2,scale=640:480,fps=30000/1001]

[vhs-pal]
profile-desc=PAL: 768x576 @ 25, YUV, 50 Hz hum
profile=vhs-base
glsl-shader-opts-append=vhs/STANDARD=PAL
vf-add=lavfi=[scale=iw*sar:ih,setsar=1,pad=max(iw\,ceil(ih*4/3)):max(ih\,ceil(iw*3/4)):(ow-iw)/2:(oh-ih)/2,scale=768:576,fps=25]

[vhs-audio-clean]
profile-desc=Audio tier: gentle wow/flutter, full bandwidth — good tape/deck
script-opts-append=vhs-audio=clean
af-add=lavfi=[lowpass=f=12000]
af-add=lavfi=[vibrato=f=1.03:d=0.20]
af-add=lavfi=[vibrato=f=1.17:d=0.15]
af-add=lavfi=[vibrato=f=11.1:d=0.02]
af-add=lavfi=[tremolo=f=12.1:d=0.05]
af-add=lavfi=[alimiter=limit=0.92]

[vhs-audio-worn]
profile-desc=Audio tier: dulled highs, audible wow/flutter, print-through echo — worn tape
script-opts-append=vhs-audio=worn
af-add=lavfi=[lowpass=f=6400]
af-add=lavfi=[vibrato=f=1.03:d=0.25]
af-add=lavfi=[vibrato=f=1.17:d=0.15]
af-add=lavfi=[vibrato=f=1.47:d=0.10]
af-add=lavfi=[vibrato=f=11.1:d=0.04]
af-add=lavfi=[tremolo=f=12.1:d=0.10]
af-add=lavfi=[alimiter=limit=0.92]
af-add=lavfi=[aecho=1:0.96:38:0.03]

[vhs-audio-dying]
profile-desc=Audio tier: muffled, heavy wow/flutter, print-through echo — ancient tape
script-opts-append=vhs-audio=dying
af-add=lavfi=[lowpass=f=3200]
af-add=lavfi=[vibrato=f=1.03:d=0.60]
af-add=lavfi=[vibrato=f=1.17:d=0.30]
af-add=lavfi=[vibrato=f=1.47:d=0.25]
af-add=lavfi=[vibrato=f=1.89:d=0.20]
af-add=lavfi=[tremolo=f=11.1:d=0.20]
af-add=lavfi=[tremolo=f=12.1:d=0.20]
af-add=lavfi=[alimiter=limit=0.92]
af-add=lavfi=[aecho=1:0.94:55:0.06]

[vhs-hum-ntsc-clean]
profile-cond=glsl_shader_opts["vhs/STANDARD"] == "NTSC" and script_opts["vhs-audio"] == "clean"
af-add=lavfi=[anoisesrc=color=pink:amplitude=0.60:sample_rate=48000[pink];sine=frequency=60:sample_rate=48000[h1];sine=frequency=120:sample_rate=48000[h2];[in][pink][h1][h2]amix=inputs=4:duration=first:weights='1 0.02 0.024 0.016':normalize=0[out]]

[vhs-hum-ntsc-worn]
profile-cond=glsl_shader_opts["vhs/STANDARD"] == "NTSC" and script_opts["vhs-audio"] == "worn"
af-add=lavfi=[anoisesrc=color=pink:amplitude=0.70:sample_rate=48000[pink];sine=frequency=60:sample_rate=48000[h1];sine=frequency=120:sample_rate=48000[h2];[in][pink][h1][h2]amix=inputs=4:duration=first:weights='1 0.04 0.036 0.024':normalize=0[out]]

[vhs-hum-ntsc-dying]
profile-cond=glsl_shader_opts["vhs/STANDARD"] == "NTSC" and script_opts["vhs-audio"] == "dying"
af-add=lavfi=[anoisesrc=color=pink:amplitude=0.80:sample_rate=48000[pink];sine=frequency=60:sample_rate=48000[h1];sine=frequency=120:sample_rate=48000[h2];[in][pink][h1][h2]amix=inputs=4:duration=first:weights='1 0.08 0.096 0.064':normalize=0[out]]

[vhs-hum-pal-clean]
profile-cond=glsl_shader_opts["vhs/STANDARD"] == "PAL" and script_opts["vhs-audio"] == "clean"
af-add=lavfi=[anoisesrc=color=pink:amplitude=0.60:sample_rate=48000[pink];sine=frequency=50:sample_rate=48000[h1];sine=frequency=100:sample_rate=48000[h2];[in][pink][h1][h2]amix=inputs=4:duration=first:weights='1 0.02 0.024 0.016':normalize=0[out]]

[vhs-hum-pal-worn]
profile-cond=glsl_shader_opts["vhs/STANDARD"] == "PAL" and script_opts["vhs-audio"] == "worn"
af-add=lavfi=[anoisesrc=color=pink:amplitude=0.70:sample_rate=48000[pink];sine=frequency=50:sample_rate=48000[h1];sine=frequency=100:sample_rate=48000[h2];[in][pink][h1][h2]amix=inputs=4:duration=first:weights='1 0.04 0.036 0.024':normalize=0[out]]

[vhs-hum-pal-dying]
profile-cond=glsl_shader_opts["vhs/STANDARD"] == "PAL" and script_opts["vhs-audio"] == "dying"
af-add=lavfi=[anoisesrc=color=pink:amplitude=0.80:sample_rate=48000[pink];sine=frequency=50:sample_rate=48000[h1];sine=frequency=100:sample_rate=48000[h2];[in][pink][h1][h2]amix=inputs=4:duration=first:weights='1 0.08 0.096 0.064':normalize=0[out]]

[vhs-hdr]
profile-desc=Tone-map HDR to SDR ahead of the shader (auto-applied for HDR sources when a VHS standard is active)
profile-cond=video_params.gamma == "pq" or video_params.gamma == "hlg"
profile-restore=copy
vf-add=lavfi=[format=gbrpf32le,zscale=transfer=linear:npl=100,tonemap=mobius:param=0.9,zscale=primaries=bt709:transfer=bt709:matrix=bt709:range=tv,format=yuv420p]
vf-add=format:sig-peak=1

[vhs-pal-no-ep]
profile-desc=PAL has no EP mode — cap EP to LP
profile-cond=glsl_shader_opts["vhs/STANDARD"] == "PAL" and glsl_shader_opts["vhs/RECORDING_MODE"] == "EP"
glsl-shader-opts-append=vhs/RECORDING_MODE=LP

[vhs-tv-record-ghosting-ntsc]
profile-cond=glsl_shader_opts["vhs/STANDARD"] == "NTSC" and script_opts["vhs-preset"] == "tv-record"
glsl-shader-opts-append=vhs/GHOSTING=0.55

[vhs-tv-record-ghosting-pal]
profile-cond=glsl_shader_opts["vhs/STANDARD"] == "PAL" and script_opts["vhs-preset"] == "tv-record"
glsl-shader-opts-append=vhs/GHOSTING=0.35

# ── PRESETS ───────────────────────────────────────────────────────────────────

[vhs-home]
profile-desc=VHS: typical home recording — SP, good tape, average deck
profile=vhs-audio-clean
script-opts-append=vhs-preset=home
glsl-shader-opts-add=vhs/TAPE_AGE=0.28
glsl-shader-opts-add=vhs/TAPE_WEAR=0.30
glsl-shader-opts-add=vhs/HEAD_ALIGNMENT=0.20
glsl-shader-opts-add=vhs/HEAD_WEAR=0.25
glsl-shader-opts-add=vhs/TRACKING=0.12
glsl-shader-opts-add=vhs/GENERATION=1.0
glsl-shader-opts-add=vhs/SYNC_STABILITY=0.92
glsl-shader-opts-add=vhs/RECORDING_MODE=SP

[vhs-camcorder]
profile-desc=VHS: handheld camcorder — LP, new tape, decent heads, locked sync
profile=vhs-audio-clean
script-opts-append=vhs-preset=camcorder
glsl-shader-opts-add=vhs/TAPE_AGE=0.15
glsl-shader-opts-add=vhs/TAPE_WEAR=0.15
glsl-shader-opts-add=vhs/HEAD_ALIGNMENT=0.20
glsl-shader-opts-add=vhs/HEAD_WEAR=0.18
glsl-shader-opts-add=vhs/TRACKING=0.12
glsl-shader-opts-add=vhs/GENERATION=1.0
glsl-shader-opts-add=vhs/SYNC_STABILITY=0.93
glsl-shader-opts-add=vhs/RECORDING_MODE=LP

[vhs-tv-record]
profile-desc=VHS: recorded off broadcast TV — LP, clean signal, good deck
profile=vhs-audio-clean
script-opts-append=vhs-preset=tv-record
glsl-shader-opts-add=vhs/TAPE_AGE=0.22
glsl-shader-opts-add=vhs/TAPE_WEAR=0.20
glsl-shader-opts-add=vhs/HEAD_ALIGNMENT=0.15
glsl-shader-opts-add=vhs/HEAD_WEAR=0.18
glsl-shader-opts-add=vhs/TRACKING=0.15
glsl-shader-opts-add=vhs/GENERATION=1.0
glsl-shader-opts-add=vhs/SYNC_STABILITY=0.90
glsl-shader-opts-add=vhs/RECORDING_MODE=LP

[vhs-rental]
profile-desc=VHS: rental store tape — SP, worn, worn deck, 2nd gen
profile=vhs-audio-worn
script-opts-append=vhs-preset=rental
glsl-shader-opts-add=vhs/TAPE_AGE=0.65
glsl-shader-opts-add=vhs/TAPE_WEAR=0.70
glsl-shader-opts-add=vhs/HEAD_ALIGNMENT=0.55
glsl-shader-opts-add=vhs/HEAD_WEAR=0.58
glsl-shader-opts-add=vhs/TRACKING=0.52
glsl-shader-opts-add=vhs/GENERATION=2.0
glsl-shader-opts-add=vhs/SYNC_STABILITY=0.58
glsl-shader-opts-add=vhs/RECORDING_MODE=SP

[vhs-bootleg]
profile-desc=VHS: EP copy-of-copy — cramped, grainy, wobbly, smeared color
profile=vhs-audio-worn
script-opts-append=vhs-preset=bootleg
glsl-shader-opts-add=vhs/TAPE_AGE=0.48
glsl-shader-opts-add=vhs/TAPE_WEAR=0.55
glsl-shader-opts-add=vhs/HEAD_ALIGNMENT=0.60
glsl-shader-opts-add=vhs/HEAD_WEAR=0.62
glsl-shader-opts-add=vhs/TRACKING=0.55
glsl-shader-opts-add=vhs/GENERATION=3.0
glsl-shader-opts-add=vhs/SYNC_STABILITY=0.60
glsl-shader-opts-add=vhs/RECORDING_MODE=EP

[vhs-nth-copy]
profile-desc=VHS: 4th-gen EP dub — barely coherent, washed-out, noisy
profile=vhs-audio-worn
script-opts-append=vhs-preset=nth-copy
glsl-shader-opts-add=vhs/TAPE_AGE=0.55
glsl-shader-opts-add=vhs/TAPE_WEAR=0.58
glsl-shader-opts-add=vhs/HEAD_ALIGNMENT=0.50
glsl-shader-opts-add=vhs/HEAD_WEAR=0.55
glsl-shader-opts-add=vhs/TRACKING=0.45
glsl-shader-opts-add=vhs/GENERATION=4.0
glsl-shader-opts-add=vhs/SYNC_STABILITY=0.62
glsl-shader-opts-add=vhs/RECORDING_MODE=EP

[vhs-attic]
profile-desc=VHS: found in a box — old tape, worn deck, bad tracking, mystery origin
profile=vhs-audio-dying
script-opts-append=vhs-preset=attic
glsl-shader-opts-add=vhs/TAPE_AGE=0.88
glsl-shader-opts-add=vhs/TAPE_WEAR=0.85
glsl-shader-opts-add=vhs/HEAD_ALIGNMENT=0.65
glsl-shader-opts-add=vhs/HEAD_WEAR=0.70
glsl-shader-opts-add=vhs/TRACKING=0.65
glsl-shader-opts-add=vhs/GENERATION=1.0
glsl-shader-opts-add=vhs/SYNC_STABILITY=0.40
glsl-shader-opts-add=vhs/RECORDING_MODE=LP

[vhs-dying]
profile-desc=VHS: terminal playback — ancient tape, clogged head, EP, sync lost
profile=vhs-audio-dying
script-opts-append=vhs-preset=dying
glsl-shader-opts-add=vhs/TAPE_AGE=0.96
glsl-shader-opts-add=vhs/TAPE_WEAR=0.96
glsl-shader-opts-add=vhs/HEAD_ALIGNMENT=0.95
glsl-shader-opts-add=vhs/HEAD_WEAR=0.95
glsl-shader-opts-add=vhs/TRACKING=0.92
glsl-shader-opts-add=vhs/GENERATION=3.0
glsl-shader-opts-add=vhs/SYNC_STABILITY=0.12
glsl-shader-opts-add=vhs/RECORDING_MODE=EP
