# vhs-common.conf — shared profiles for vhs-ntsc.conf / vhs-pal.conf.
# Don't load this directly; both standard configs `include` it. Everything here is
# standard-agnostic (identical for NTSC and PAL).

# Deck / output settings.
[vhs-common-video]
profile-desc=Common VHS deck/output settings (NTSC + PAL)
profile=fast
# override fast's bilinear upscale: at non-integer fullscreen factors (480->2160 = 4.5x) bilinear
# renders the shader's line-quantized noise as alternating crisp/milky bands with visible edges
scale=spline36
hwdec=auto-copy
vo=gpu-next
ao=avfoundation
audio-channels=stereo

# HDR sources: the shader's matrices and noise amplitudes assume SDR BT.709 gamma in [0,1],
# and user-shader hooks run BEFORE mpv's own tone mapping — so HDR is tone-mapped in the vf
# chain instead, auto-applied when the source reports an HDR peak (can also be forced:
# mpv --profile=vhs-home,vhs-hdr movie.mkv). Verified invariant: black bars through this path
# carry the same shader-noise statistics as a native SDR source.
# npl=100: SDR home-video masters were graded to 100-nit reference. tonemap=mobius with the
# knee raised to param=0.9: below ~90 nits the signal passes bit-faithfully (like native SDR),
# 90-nits-to-peak soft-rolls into the top 10% — a broadcast legalizer, essentially. The default
# knee (0.3) is a trap: with real mastering metadata (e.g. a 4000-nit master) it crushes
# everything above 30 nits into a thin dim band.
[vhs-hdr]
profile-desc=Tone-map HDR to SDR ahead of the shader (auto-applied for HDR sources)
profile-cond=(p["video-params/sig-peak"] or 1) > 1
profile-restore=copy
vf-add=lavfi=[format=gbrpf32le,zscale=transfer=linear:npl=100,tonemap=mobius:param=0.9,zscale=primaries=bt709:transfer=bt709:matrix=bt709:range=tv,format=yuv420p]
# the lavfi bridge KEEPS the source's sig-peak (AVFrames can't express it), so gpu-next would
# treat the tone-mapped SDR as 49x-peak content and re-tone-map the shader's output — reset it
vf-add=format:sig-peak=1

# Base audio chain: mono (linear VHS), subsonic cut, record AGC, bass lift. The per-tier
# hum is injected downstream (in each standard's audio-* tier), so this highpass only cleans
# the program's subsonic — it never touches the hum, hence it's common, not per-standard.
[vhs-common-audio]
profile-desc=Common base audio chain (NTSC + PAL)
af=lavfi=[aformat=channel_layouts=stereo]
af-add=lavfi=[extrastereo=m=0]
af-add=lavfi=[highpass=50]
af-add=lavfi=[acompressor=threshold=-18dB:ratio=4:attack=20:release=250:makeup=2]
af-add=lavfi=[bass=g=2:f=110:w=0.8]

# Per-tier "tape character": bandwidth rolloff (lowpass) + wow/flutter (vibrato/tremolo)
# + limiter. Identical for both standards — only the hum differs, and that lives in each
# standard's audio-* tier. Composed AFTER audio-* in the preset's profile list, so the
# lowpass band-limits the program's hiss along with the signal.
[vhs-common-audio-clean]
af-add=lavfi=[lowpass=f=12000]
af-add=lavfi=[vibrato=f=1.03:d=0.20]
af-add=lavfi=[vibrato=f=1.17:d=0.15]
af-add=lavfi=[vibrato=f=11.1:d=0.02]
af-add=lavfi=[tremolo=f=12.1:d=0.05]
af-add=lavfi=[alimiter=limit=0.92]

[vhs-common-audio-worn]
af-add=lavfi=[lowpass=f=6400]
af-add=lavfi=[vibrato=f=1.03:d=0.25]
af-add=lavfi=[vibrato=f=1.17:d=0.15]
af-add=lavfi=[vibrato=f=1.47:d=0.10]
af-add=lavfi=[vibrato=f=11.1:d=0.04]
af-add=lavfi=[tremolo=f=12.1:d=0.10]
af-add=lavfi=[alimiter=limit=0.92]

[vhs-common-audio-dying]
af-add=lavfi=[lowpass=f=3200]
af-add=lavfi=[vibrato=f=1.03:d=0.60]
af-add=lavfi=[vibrato=f=1.17:d=0.30]
af-add=lavfi=[vibrato=f=1.47:d=0.25]
af-add=lavfi=[vibrato=f=1.89:d=0.20]
af-add=lavfi=[tremolo=f=11.1:d=0.20]
af-add=lavfi=[tremolo=f=12.1:d=0.20]
af-add=lavfi=[alimiter=limit=0.92]
